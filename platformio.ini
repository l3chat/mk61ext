[env:pico]
platform = raspberrypi
board = pico
framework = arduino

; Flash the Pico by producing a UF2 and copying it to the BOOTSEL mass-storage device.
upload_protocol = custom
upload_command = "$PROJECT_DIR/scripts/upload_uf2.sh" "$BUILD_DIR/${PROGNAME}.uf2" "$UPLOAD_PORT"

lib_deps =
  olikraus/U8g2
  sparkfun/SparkFun External EEPROM Arduino Library
